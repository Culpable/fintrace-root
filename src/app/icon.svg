<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Preserve the production wordmark’s luminous gate as a geometry-only browser mark. -->
  <defs>
    <linearGradient id="gate-core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d4a94e" stop-opacity="0" />
      <stop offset="0.2" stop-color="#f0d491" />
      <stop offset="0.5" stop-color="#d4a94e" />
      <stop offset="0.8" stop-color="#f0d491" />
      <stop offset="1" stop-color="#d4a94e" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="gate-halo">
      <stop offset="0" stop-color="#f0d491" stop-opacity="0.55" />
      <stop offset="0.42" stop-color="#d4a94e" stop-opacity="0.2" />
      <stop offset="1" stop-color="#8a6a2b" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="#0d0b09" />
  <ellipse cx="32" cy="32" rx="18" ry="27" fill="url(#gate-halo)" />
  <rect x="28.5" y="10" width="7" height="44" rx="3.5" fill="url(#gate-core)" />
  <rect x="30.5" y="12" width="3" height="40" rx="1.5" fill="#f0d491" fill-opacity="0.7" />
</svg>
